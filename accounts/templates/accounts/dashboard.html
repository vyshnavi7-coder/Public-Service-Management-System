<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<h1>My Dashboard</h1>

<div class="row mt-4">

<div class="col-md-4">
<div class="card">
<div class="card-body">
<h3>{{ total }}</h3>
<p>Total Complaints</p>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card">
<div class="card-body">
<h3>{{ pending }}</h3>
<p>Pending</p>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card">
<div class="card-body">
<h3>{{ resolved }}</h3>
<p>Resolved</p>
</div>
</div>
</div>

</div>

<hr>

<h3>My Complaints</h3>

<table class="table table-bordered">

<tr>
    <th>ID</th>
    <th>Department</th>
    <th>Status</th>
</tr>

{% for complaint in complaints %}

<tr>
    <td>{{ complaint.complaint_id }}</td>
    <td>{{ complaint.department }}</td>
    <td>{{ complaint.status }}</td>
</tr>

{% endfor %}

</table>

</div>

</body>
</html>
